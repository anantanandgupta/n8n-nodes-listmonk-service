name: Code Linting

on:
  push:
    branches:
        - '*'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-lint:
    name: Code Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: npm run lint
